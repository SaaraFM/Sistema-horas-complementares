services:
  - type: web
    name: sistema-horas-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn src.main:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: FRONTEND_ORIGIN
        value: https://sistema-horas-complementares.netlify.app
